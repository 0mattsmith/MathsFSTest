<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Maths FS Practice</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icons/icon.svg" type="image/svg+xml" />
  <link rel="icon" href="assets/icons/icon-192.png" sizes="192x192" type="image/png" />
  <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
  <meta name="theme-color" content="#003057" />
  <link rel="stylesheet" href="src/renderer/styles/main.css" />
  <link rel="stylesheet" href="src/renderer/styles/print.css" media="print" />
</head>
<body>
  <div id="player" class="player">
    <!-- Title bar.
         • On macOS the real OS traffic-light buttons are rendered by the
           Electron `titleBarStyle: 'hiddenInset'` setting, overlaying the
           top-left of this bar. CSS leaves space for them and hides the
           fake .tb-ctl Windows-style controls.
         • On Windows (frameless) the .tb-ctl strip is shown and wired up
           to IPC by app.js.
         • In the browser (Chromebook PWA), the browser/Chrome OS chrome
           handles everything; CSS hides both fake control sets. -->
    <div class="player-titlebar">
      <span class="tb-mac-pad" aria-hidden="true"></span>
      <span class="tb-title">Maths FS Practice &mdash; Test Player Preview</span>
      <span class="tb-spacer"></span>
      <span class="tb-board" id="tb-board-label">Edexcel</span>
      <span class="tb-ctl tb-min" title="Minimise" aria-label="Minimise">&minus;</span>
      <span class="tb-ctl tb-max" title="Maximise" aria-label="Maximise">&#9633;</span>
      <span class="tb-ctl tb-close" title="Close" aria-label="Close">&times;</span>
    </div>

    <div id="screen" class="screen"></div>

    <div id="footerbar" class="footerbar hide">
      <div class="fb-left">
        <button class="fb-icon" id="fb-calc" title="Calculator (Section B only)" aria-label="Calculator">&#9635;</button>
        <button class="fb-icon" id="fb-help" title="Help" aria-label="Help">?</button>
        <button class="fb-icon" id="fb-flag" title="Flag this question" aria-label="Flag">&#9873;</button>
      </div>
      <div class="fb-center">
        <button id="btn-prev" class="orange-btn">&#9664; Previous</button>
        <span id="page-counter" class="page-counter">&nbsp;</span>
        <button id="btn-next" class="orange-btn">Next &#9654;</button>
        <span id="timer" class="timer"><span class="hourglass">&#8987;</span><span id="timer-text">00:00</span></span>
      </div>
      <div class="fb-right">
        <button id="btn-marks" class="orange-btn">Marks</button>
        <button id="btn-save" class="orange-btn">Save</button>
      </div>
    </div>
  </div>

  <div id="calc-pane" class="calc-pane hide" aria-hidden="true">
    <div class="calc-head">
      <span class="calc-handle">Calculator</span>
      <button id="calc-close" class="calc-close" title="Hide calculator" aria-label="Hide calculator">&times;</button>
    </div>
    <div class="calc-display" id="calc-display">0</div>
    <div class="calc-keys" id="calc-keys"></div>
  </div>

  <script type="module" src="src/renderer/app.js"></script>
</body>
</html>
