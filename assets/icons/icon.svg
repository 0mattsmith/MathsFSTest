<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- App icon for Maths FS Revision. Pearson navy background with the
       orange exam-button accent, plus a stylised "fx" / sigma combo to
       signal "Maths Functional Skills". Designed to also work as a
       maskable icon — important content sits inside the inner safe
       zone of ~80% of the canvas. -->
  <rect width="512" height="512" rx="80" fill="#003057"/>
  <!-- inner card -->
  <rect x="56" y="56" width="400" height="400" rx="44" fill="#fdfaf3"/>
  <!-- header bar -->
  <rect x="56" y="56" width="400" height="78" rx="44" fill="#003057"/>
  <rect x="56" y="100" width="400" height="34" fill="#003057"/>
  <text x="256" y="108" font-family="Arial, Helvetica, sans-serif" font-size="36"
        font-weight="700" fill="#ffffff" text-anchor="middle">FUNCTIONAL SKILLS</text>
  <!-- maths glyph -->
  <text x="256" y="280" font-family="Georgia, Times, serif" font-size="190"
        font-weight="700" fill="#003057" text-anchor="middle">f(x)</text>
  <!-- subline -->
  <text x="256" y="340" font-family="Arial, Helvetica, sans-serif" font-size="34"
        font-weight="600" fill="#003057" text-anchor="middle">MATHS</text>
  <!-- orange pill (the Edexcel "Next" button motif) -->
  <rect x="156" y="376" width="200" height="44" rx="22"
        fill="#f0801f" stroke="#c66108" stroke-width="3"/>
  <text x="256" y="406" font-family="Arial, Helvetica, sans-serif" font-size="22"
        font-weight="700" fill="#ffffff" text-anchor="middle">REVISE ▶</text>
</svg>
